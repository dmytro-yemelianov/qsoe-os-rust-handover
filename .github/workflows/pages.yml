name: Roadmap Pages

on:
  push:
    branches: [main]
    paths:
      - "Makefile"
      - "docs/roadmap/**"
      - ".github/workflows/pages.yml"
      - "scripts/roadmap-gates.py"
  workflow_dispatch:

permissions:
  contents: read
  issues: read

concurrency:
  group: qsoe-roadmap-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy roadmap app
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout needs repository contents.
      issues: read # roadmap validator reads issue-backed metadata.
      pages: write # deploy-pages publishes the Pages artifact.
      id-token: write # deploy-pages uses OIDC for Pages deployment.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Validate roadmap issue metadata
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: make roadmap-validate

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with:
          enablement: true

      - name: Upload roadmap app
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs/roadmap

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
