name: CI

permissions:
  contents: read
  issues: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: qsoe-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qsoe:
    name: QSOE build, checks, and boot smoke
    # Match the hosted runner label used by dmytro-yemelianov/rapsody main CI.
    runs-on: [self-hosted, X64]
    timeout-minutes: 180
    env:
      QSOE_CONTAINER_CACHE_ROOT: ${{ github.workspace }}/.qsoe-cache/container
      QSOE_SCCACHE: "1"
      QSOE_SCCACHE_C: "1"
      QSOE_SCCACHE_STATS: "1"
      SCCACHE_CACHE_SIZE: 2G
      SCCACHE_IDLE_TIMEOUT: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Restore Cargo and compiler cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            .qsoe-cache/container/cargo-home/registry
            .qsoe-cache/container/cargo-home/git
            .qsoe-cache/container/sccache
          key: qsoe-ci-${{ runner.os }}-${{ runner.arch }}-cargo-sccache-${{ hashFiles('rust/Cargo.lock', 'rust/fuzz/Cargo.lock', 'rust/Cargo.toml', 'rust/**/Cargo.toml', 'rust/rust-toolchain.toml', 'toolchains/debian/Dockerfile', 'scripts/container-toolchain.sh', 'scripts/sccache-compiler-wrapper.sh', 'scripts/rust-env.sh', 'scripts/rust-workflow.sh', 'patches/components/*.patch') }}
          restore-keys: |
            qsoe-ci-${{ runner.os }}-${{ runner.arch }}-cargo-sccache-

      - name: Validate roadmap issue metadata
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: make roadmap-validate

      - name: Build Debian toolchain image
        run: make container-toolchain-build

      - name: Build release source tree
        run: make container-source-build

      - name: Audit installed userland artifacts
        run: make container-audit-artifacts

      - name: Run host fixtures and Rust quality gate
        run: make container-check

      - name: Run Rust ABI/link gate
        run: make container-rust-abi

      - name: Capture C compile database and run bounded clang-tidy
        run: |
          scripts/container-toolchain.sh run bash -c '
            QSOE_INDEX_CLEAN=1 QSOE_INDEX_DB_FLAVOR=container make index-c-compile-db
            QSOE_TIDY_LIMIT=10 make tidy-c
          '

      - name: Boot smoke LQ image
        run: scripts/container-toolchain.sh run scripts/boot-smoke.sh -k lq -t 120

      - name: Run Rust slogger readback smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-slogger-rc-readback-smoke

      - name: Run Rust test_msgpass smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-rust-test-msgpass-smoke

      - name: Run mkfs-qrv Rust-default RC live smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-mkfs-qrv-rc-live-smoke

      - name: Run mkfs-qrv C rollback live smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-mkfs-qrv-rc-rollback-smoke

      - name: Run Rust pipe data-path smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-rust-pipe-data-smoke

      - name: Run pipe Rust-default RC data smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-pipe-rc-data-smoke

      - name: Run tm_cpio Rust-only evidence
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-cpio-evidence

      - name: Run tm_cpio Rust runtime smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-cpio-runtime-smoke

      - name: Run tm_cpio Rust-default RC smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-cpio-rc-smoke

      - name: Run tm_cred Rust-default RC evidence
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-cred-evidence

      - name: Run tm_cred Rust runtime smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-cred-runtime-smoke

      - name: Run tm_cred Rust-default RC smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-cred-rc-smoke

      - name: Run tm_script Rust-only evidence
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-script-evidence

      - name: Run tm_script Rust runtime smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-script-runtime-smoke

      - name: Run tm_script Rust-default RC smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-script-rc-smoke

      - name: Run tm_elf Rust-only evidence
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-elf-evidence

      - name: Run tm_elf Rust runtime smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-elf-runtime-smoke

      - name: Run tm_elf Rust-default RC smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-elf-rc-smoke

      - name: Run tm_fdt Rust-default RC evidence
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-fdt-evidence

      - name: Run tm_fdt Rust runtime smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-fdt-runtime-smoke

      - name: Run tm_fdt Rust-default RC smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-fdt-rc-smoke

      - name: Run tm_fdt C rollback RC smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-fdt-rc-rollback-smoke

      - name: Run tm_pathmgr Rust-default RC evidence
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-pathmgr-evidence

      - name: Run tm_pathmgr Rust runtime smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-pathmgr-runtime-smoke

      - name: Run tm_pathmgr Rust-default RC smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-pathmgr-rc-smoke

      - name: Run tm_rsrcdb Rust-default RC evidence
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-rsrcdb-evidence

      - name: Run tm_rsrcdb Rust runtime smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-rsrcdb-runtime-smoke

      - name: Run tm_rsrcdb Rust-default RC smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-rsrcdb-rc-smoke

      - name: Run tm_syscfg Rust-only evidence
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-syscfg-evidence

      - name: Run tm_syscfg Rust runtime smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-syscfg-runtime-smoke

      - name: Run tm_syscfg Rust-default RC smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-syscfg-rc-smoke

      - name: Run tm_sysmap Rust-only evidence
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-sysmap-evidence

      - name: Run tm_sysmap Rust runtime smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-sysmap-runtime-smoke

      - name: Run tm_sysmap Rust-default RC smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-sysmap-rc-smoke

      - name: Run tm_procfs Rust-only evidence
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-procfs-evidence

      - name: Run tm_pseudodev Rust-default RC evidence
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-pseudodev-evidence

      - name: Run tm_pseudodev Rust runtime smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-pseudodev-runtime-smoke

      - name: Run tm_pseudodev Rust-default RC smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-pseudodev-rc-smoke

      - name: Run tm_sysfs Rust opt-in evidence
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-sysfs-evidence

      - name: Run tm_sysfs Rust runtime smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-sysfs-runtime-smoke

      - name: Run tm_sysfs retired RC smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: make container-tm-sysfs-rc-smoke

      - name: Show cache directory sizes
        if: always()
        run: du -sh .qsoe-cache/container/cargo-home .qsoe-cache/container/sccache || true

      - name: Upload boot smoke logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: qsoe-boot-smoke-logs
          path: |
            build/boot-smoke-*.log
            build/slog-readback-smoke-lq-slogger-rc-*.log
            build/slogger-rc/*.log
            build/rust-test-msgpass/*.log
            build/mkfs-qrv-rc/*.log
            build/rust-pipe-data/*.log
            build/pipe-rc/*.log
            build/tm-cpio-evidence/**/*.log
            build/tm-cpio-evidence/**/*.txt
            build/tm-cpio-runtime-smoke/*.log
            build/tm-cpio-rc/*.log
            build/tm-cpio-rc/*.txt
            build/tm-cred-evidence/**/*.log
            build/tm-cred-evidence/**/*.txt
            build/tm-cred-runtime-smoke/*.log
            build/tm-cred-runtime-smoke/*.txt
            build/tm-cred-rc/*.log
            build/tm-cred-rc/*.txt
            build/tm-script-evidence/**/*.log
            build/tm-script-evidence/**/*.txt
            build/tm-script-runtime-smoke/*.log
            build/tm-script-rc/*.log
            build/tm-script-rc/*.txt
            build/tm-elf-evidence/**/*.log
            build/tm-elf-evidence/**/*.txt
            build/tm-elf-runtime-smoke/*.log
            build/tm-elf-rc/*.log
            build/tm-elf-rc/*.txt
            build/tm-fdt-evidence/**/*.log
            build/tm-fdt-evidence/**/*.txt
            build/tm-fdt-runtime-smoke/*.log
            build/tm-fdt-runtime-smoke/*.txt
            build/tm-fdt-rc/*.log
            build/tm-fdt-rc/*.txt
            build/tm-pathmgr-evidence/**/*.log
            build/tm-pathmgr-evidence/**/*.txt
            build/tm-pathmgr-runtime-smoke/*.log
            build/tm-pathmgr-runtime-smoke/*.txt
            build/tm-pathmgr-rc/*.log
            build/tm-pathmgr-rc/*.txt
            build/tm-rsrcdb-evidence/**/*.log
            build/tm-rsrcdb-evidence/**/*.txt
            build/tm-rsrcdb-runtime-smoke/*.log
            build/tm-rsrcdb-runtime-smoke/*.txt
            build/tm-rsrcdb-rc/*.log
            build/tm-rsrcdb-rc/*.txt
            build/tm-syscfg-evidence/**/*.log
            build/tm-syscfg-evidence/**/*.txt
            build/tm-syscfg-runtime-smoke/*.log
            build/tm-syscfg-runtime-smoke/*.txt
            build/tm-syscfg-rc/*.log
            build/tm-syscfg-rc/*.txt
            build/tm-sysmap-evidence/**/*.log
            build/tm-sysmap-evidence/**/*.txt
            build/tm-sysmap-runtime-smoke/*.log
            build/tm-sysmap-runtime-smoke/*.txt
            build/tm-sysmap-rc/*.log
            build/tm-sysmap-rc/*.txt
            build/tm-procfs-evidence/**/*.log
            build/tm-procfs-evidence/**/*.txt
            build/tm-pseudodev-evidence/**/*.log
            build/tm-pseudodev-evidence/**/*.txt
            build/tm-pseudodev-runtime-smoke/*.log
            build/tm-pseudodev-runtime-smoke/*.txt
            build/tm-pseudodev-rc/*.log
            build/tm-pseudodev-rc/*.txt
            build/tm-sysfs-evidence/**/*.log
            build/tm-sysfs-evidence/**/*.txt
            build/tm-sysfs-runtime-smoke/*.log
            build/tm-sysfs-runtime-smoke/*.txt
            build/tm-sysfs-rc/*.log
            build/tm-sysfs-rc/*.txt
          if-no-files-found: ignore
